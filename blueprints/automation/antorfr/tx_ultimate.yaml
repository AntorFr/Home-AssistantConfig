blueprint:
  name: TX Ultimate
  description: >
    Manage interactions with TX Ultimate.
    Version de migration : supporte les deux approches en parallèle.
    - Ancien firmware : renseigner les entités binary_sensor individuelles (Touchfield 1/2/3,
      Long press, Multi touch, Swipe left/right).
    - Nouveau firmware (event: entity) : renseigner uniquement "Action event".
    Les deux modes peuvent coexister — configurer uniquement les inputs qui correspondent
    au firmware installé sur le device.
  domain: automation
  source_url: https://github.com/AntorFr/Home-AssistantConfig/blob/master/blueprints/automation/antorfr/tx_ultimate.yaml
  input:

    # ── Nouveau firmware : entité event (firmware avec event: entity) ──────────
    action_event:
      name: Action event (nouveau firmware)
      description: >
        Entité event TX Ultimate. Disponible sur les devices avec le firmware
        intégrant l'entité event. Laisser vide pour les devices avec l'ancien firmware.
        Quand renseigné, remplace les triggers Touchfield/gestes ci-dessous.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
              domain: event

    # ── Ancien firmware : binary_sensor individuels ────────────────────────────
    touchfield_1:
      name: Touchfield 1 (ancien firmware)
      description: Entité binary_sensor Touchfield 1. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    touchfield_2:
      name: Touchfield 2 (ancien firmware)
      description: Entité binary_sensor Touchfield 2. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    touchfield_3:
      name: Touchfield 3 (ancien firmware)
      description: Entité binary_sensor Touchfield 3. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    long_press:
      name: Long press (ancien firmware)
      description: Entité binary_sensor Long press. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    multi_touch:
      name: Multi touch (ancien firmware)
      description: Entité binary_sensor Multi touch. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    swipe_left:
      name: Swipe left (ancien firmware)
      description: Entité binary_sensor Swipe left. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    swipe_right:
      name: Swipe right (ancien firmware)
      description: Entité binary_sensor Swipe right. Laisser vide si action_event est configuré.
      default: []
      selector:
        entity:
          filter:
            - integration: esphome
            - domain: binary_sensor

    # ── Actions communes (identiques v1/v2) ───────────────────────────────────
    touchfield_1_controlled_entites:
      name: Touchfield 1 controlled entities
      description: >
        Entités contrôlées par le bouton gauche (button_left_press) ou Touchfield 1.
        Sur switch 1 bouton : utiliser Touchfield 2. Sur switch 2 boutons : gauche.
      default: []
      selector:
        entity:
          multiple: true

    touchfield_2_controlled_entites:
      name: Touchfield 2 controlled entities
      description: >
        Entités contrôlées par le bouton centre (button_center_press) ou Touchfield 2.
        Sur switch 1 bouton : configurer ici (toujours center). Sur switch 3 boutons : centre.
      default: []
      selector:
        entity:
          multiple: true

    touchfield_3_controlled_entites:
      name: Touchfield 3 controlled entities
      description: >
        Entités contrôlées par le bouton droit (button_right_press) ou Touchfield 3.
        Sur switch 2 boutons : droite. Sur switch 3 boutons : droite.
      default: []
      selector:
        entity:
          multiple: true

    touchfield_1_action:
      name: Touchfield 1 action (si pas d'entités configurées)
      default: []
      selector:
        action: {}

    touchfield_2_action:
      name: Touchfield 2 action (si pas d'entités configurées)
      default: []
      selector:
        action: {}

    touchfield_3_action:
      name: Touchfield 3 action (si pas d'entités configurées)
      default: []
      selector:
        action: {}

    long_press_action:
      name: Long press action
      default:
        - action: script.play_mood_music
          data:
            action: play_stop
            areas: "{{room}}"
      selector:
        action: {}

    multi_touch_action:
      name: Multi touch action
      default:
        - parallel:
          - action: light.turn_off
            target:
              area_id: "{{room}}"
            data: {}
          - action: script.play_mood_music
            data:
              action: media_stop
              areas: "{{room}}"
      selector:
        action: {}

    swipe_left_action:
      name: Swipe left action
      default:
        - action: cover.toggle
          target:
            area_id: "{{room}}"
      selector:
        action: {}

    swipe_right_action:
      name: Swipe right action
      default:
        - action: cover.toggle
          target:
            area_id: "{{room}}"
      selector:
        action: {}

mode: parallel

variables:
  long_press: !input long_press
  action_event: !input action_event
  touchfield_1_controlled_entites: !input touchfield_1_controlled_entites
  touchfield_2_controlled_entites: !input touchfield_2_controlled_entites
  touchfield_3_controlled_entites: !input touchfield_3_controlled_entites
  # room: dérivé de l'entité long_press (ancien fw) ou de l'entité event (nouveau fw)
  room: >
    {% if long_press %}
      {{ area_id(long_press) }}
    {% elif action_event %}
      {{ area_id(action_event) }}
    {% else %}
      ""
    {% endif %}
  adaptive_lighting: >
    {% from 'room_functions.jinja' import area_adaptive_lighting %}
    {{area_adaptive_lighting(room)}}

trigger:
  # ── Triggers ancien firmware (binary_sensor) ─────────────────────────────────
  - id: touchfield_1
    trigger: state
    entity_id: !input touchfield_1
    from: "off"
    to: "on"
  - id: touchfield_2
    trigger: state
    entity_id: !input touchfield_2
    from: "off"
    to: "on"
  - id: touchfield_3
    trigger: state
    entity_id: !input touchfield_3
    from: "off"
    to: "on"
  - id: long_press
    trigger: state
    entity_id: !input long_press
    from: "off"
    to: "on"
  - id: multi_touch
    trigger: state
    entity_id: !input multi_touch
    from: "off"
    to: "on"
  - id: swipe_left
    trigger: state
    entity_id: !input swipe_left
    from: "off"
    to: "on"
  - id: swipe_right
    trigger: state
    entity_id: !input swipe_right
    from: "off"
    to: "on"
  # ── Trigger nouveau firmware (event entity) ───────────────────────────────────
  - id: action_event
    trigger: state
    entity_id: !input action_event
    not_from: unavailable
    not_to:
      - unavailable
      - unknown
      - idle

condition: []

action:
  - choose:

    - alias: touchfield_1
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: touchfield_1
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'button_left_press' }}"
      sequence:
        - alias: "entities configurees pour touchfield 1"
          if:
            - condition: template
              value_template: "{{ touchfield_1_controlled_entites | count > 0 }}"
          then:
            - if:
                - alias: "any light still on"
                  condition: template
                  value_template: '{{ expand(touchfield_1_controlled_entites) | selectattr("state", "eq", "on") | list | count > 0 }}'
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input touchfield_1_controlled_entites
              else:
                - if:
                    - alias: "adaptive_lighting active"
                      condition: template
                      value_template: '{{ is_state(adaptive_lighting, "on") }}'
                  then:
                    - action: adaptive_lighting.apply
                      data:
                        entity_id: "{{ adaptive_lighting }}"
                        lights: "{{ touchfield_1_controlled_entites }}"
                        turn_on_lights: true
                  else:
                    - action: light.turn_on
                      target:
                        entity_id: !input touchfield_1_controlled_entites
          else: !input touchfield_1_action

    - alias: touchfield_2
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: touchfield_2
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'button_center_press' }}"
      sequence:
        - alias: "entities configurees pour touchfield 2"
          if:
            - condition: template
              value_template: "{{ touchfield_2_controlled_entites | count > 0 }}"
          then:
            - if:
                - alias: "any light still on"
                  condition: template
                  value_template: '{{ expand(touchfield_2_controlled_entites) | selectattr("state", "eq", "on") | list | count > 0 }}'
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input touchfield_2_controlled_entites
              else:
                - if:
                    - alias: "adaptive_lighting active"
                      condition: template
                      value_template: '{{ is_state(adaptive_lighting, "on") }}'
                  then:
                    - action: adaptive_lighting.apply
                      data:
                        entity_id: "{{ adaptive_lighting }}"
                        lights: "{{ touchfield_2_controlled_entites }}"
                        turn_on_lights: true
                  else:
                    - action: light.turn_on
                      target:
                        entity_id: !input touchfield_2_controlled_entites
          else: !input touchfield_2_action

    - alias: touchfield_3
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: touchfield_3
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'button_right_press' }}"
      sequence:
        - alias: "entities configurees pour touchfield 3"
          if:
            - condition: template
              value_template: "{{ touchfield_3_controlled_entites | count > 0 }}"
          then:
            - if:
                - alias: "any light still on"
                  condition: template
                  value_template: '{{ expand(touchfield_3_controlled_entites) | selectattr("state", "eq", "on") | list | count > 0 }}'
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input touchfield_3_controlled_entites
              else:
                - if:
                    - alias: "adaptive_lighting active"
                      condition: template
                      value_template: '{{ is_state(adaptive_lighting, "on") }}'
                  then:
                    - action: adaptive_lighting.apply
                      data:
                        entity_id: "{{ adaptive_lighting }}"
                        lights: "{{ touchfield_3_controlled_entites }}"
                        turn_on_lights: true
                  else:
                    - action: light.turn_on
                      target:
                        entity_id: !input touchfield_3_controlled_entites
          else: !input touchfield_3_action

    - alias: long_press
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: long_press
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'long_press' }}"
      sequence: !input long_press_action

    - alias: multi_touch
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: multi_touch
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'multi_touch' }}"
      sequence: !input multi_touch_action

    - alias: swipe_left
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: swipe_left
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'swipe_left' }}"
      sequence: !input swipe_left_action

    - alias: swipe_right
      conditions:
        - condition: or
          conditions:
            - condition: trigger
              id: swipe_right
            - condition: and
              conditions:
                - condition: trigger
                  id: action_event
                - condition: template
                  value_template: "{{ trigger.to_state.attributes.event_type == 'swipe_right' }}"
      sequence: !input swipe_right_action

    default: []
