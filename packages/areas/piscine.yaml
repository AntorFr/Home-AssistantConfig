light:
  - platform: group
    name: piscine
    entities:
      - light.underwater_pool_light
      - light.piscine_lumiere_2

sensor:
  - name: mouvement_piscine_10min
    platform: history_stats
    entity_id: binary_sensor.indoor_pool_person_occupancy
    state: "on"
    type: time
    duration: 00:10:00
    end: "{{ now() }}"
  - platform: history_stats
    name: Durée filtration piscine 24h
    entity_id: switch.filtration_piscine_filtration
    state: "on"
    type: time
    duration: "24:00:00"
    end: "{{now()}}"
  - platform: history_stats
    name: Durée electrolyse piscine 24h
    entity_id: switch.filtration_piscine_electrolyse
    state: "on"
    type: time
    duration: "24:00:00"
    end: "{{now()}}"
  - platform: history_stats
    name: Présence piscine depuis 22h
    entity_id: binary_sensor.indoor_pool_person_occupancy
    state: "on"
    type: time
    start: >
      {% if now().hour >= 22 %}
        {{ today_at('22:00') }}
      {% else %}
        {{ today_at('22:00') - timedelta(days=1) }}
      {% endif %}
    end: "{{ now() }}"
  - platform: history_stats
    name: Filtration piscine depuis 22h
    entity_id: switch.filtration_piscine_filtration
    state: "on"
    type: time
    start: >
      {% if now().hour >= 22 %}
        {{ today_at('22:00') }}
      {% else %}
        {{ today_at('22:00') - timedelta(days=1) }}
      {% endif %}
    end: "{{ now() }}"




binary_sensor:
  - platform: group
    name: "Piscine capteurs presence"
    device_class: occupancy
    unique_id: piscine_occupancy_sensors
    all: false
    entities:
      - binary_sensor.indoor_pool_person_occupancy


template:
  - binary_sensor:
      - device_class: safety
        default_entity_id: binary_sensor.swiming_pool_door_problem
        name: Piscine Sécurisée
        state: >-
          {{ is_state('input_boolean.alarme_piscine', 'on') and
             not is_state('binary_sensor.bludoor_porte_piscine_window','off') and
             not is_state('binary_sensor.indoor_pool_person_occupancy', 'on') }}
      - unique_id: water_low_level_pool_problem
        name: "Niveau d'eau piscine bas"
        device_class: problem

        # Capteur valide uniquement si la mesure est bien un nombre
        availability: >
          {{ (states('sensor.pool_water_sensor_niveau_d_eau') | float(none)) is not none }}

        # Etat ON uniquement si la valeur numérique existe et est < seuil
        state: >
          {% set v = states('sensor.pool_water_sensor_niveau_d_eau') | float(none) %}
          {{ v is not none and v < 17400 }}

        # Anti-rebond : n'allume que si c'est resté bas 2 min,
        # et n'éteint que si c'est redevenu normal 2 min.
        delay_on: "00:02:00"
        delay_off: "00:02:00"

      - unique_id: pool_filter_clogged_problem
        name: "Filtre piscine encrassé"
        device_class: problem

        # Valide uniquement si la filtration tourne et que la mesure est un nombre
        availability: >
          {{ is_state('switch.filtration_piscine_filtration', 'on')
             and (states('sensor.filtration_piscine_power_filtration') | float(none)) is not none }}

        # ON si la puissance est en dessous de 120W alors que la pompe tourne
        state: >
          {{ (states('sensor.filtration_piscine_power_filtration') | float(0)) < 120 }}

        # Anti-rebond : n'alerte que si c'est resté bas 10 min
        delay_on: "00:10:00"
        delay_off: "00:02:00"

  - sensor:
      - unique_id: piscine_filtration_need
        name: "Piscine filtration need"
        unit_of_measurement: "h"
        icon: mdi:timer-sand
        # B = T/2 + min(2, 0.5*P)  ;  R = max(0, B - F)
        # T = temp eau, P = présence depuis 22h, F = filtration depuis 22h
        state: >
          {% set T = states('sensor.plouf_temperature') | float(0) %}
          {% set P = states('sensor.presence_piscine_depuis_22h') | float(0) %}
          {% set F = states('sensor.filtration_piscine_depuis_22h') | float(0) %}
          {% set bonus = [2, 0.5 * P] | min %}
          {% set B = T / 2 + bonus %}
          {{ [0, B - F] | max | round(2) }}

      - unique_id: piscine_hp_debut
        name: "Piscine HP début"
        unit_of_measurement: "h"
        icon: mdi:clock-start
        # Si need <= 6h : ancrage 12h (on finit plus tôt)
        # Si need > 6h  : ancrage 18h (on commence plus tôt)
        state: >
          {% set need = states('sensor.piscine_filtration_need') | float(0) %}
          {% if need <= 6 %}
            12
          {% else %}
            {{ [9, 18 - need] | max }}
          {% endif %}

alert:
  swiming_pool:
    name: "Porte Piscine non sécurisée"
    message: >
      {% if is_state('binary_sensor.bludoor_porte_piscine_window', 'on') %}
      Attention, la porte de la piscine est restée ouverte sans personne
      {% elif is_state('binary_sensor.bludoor_porte_piscine_window', 'unavailable') %}
      Attention, la porte de la piscine est déconnectée.
      {% else %}
      Tout va bien
      {% endif %}
    done_message: >
      {% if is_state('input_boolean.alarme_piscine', 'off') %}
      Alarme désactivée
      {% else %}
      "Porte Piscine sécurisée"
      {% endif %}
    data:
      entity_id: camera.piscine_high
      push:
        sound:
          name: "default"
          critical: 1
          volume: 1.0
        #android
      image: "/api/camera_proxy/camera.piscine_high"
      ttl: 0
      priority: high
    entity_id: binary_sensor.swiming_pool_door_problem
    state: "on"   # Optional, 'on' is the default value
    repeat:
      - 15
      - 30
      - 60
    can_acknowledge: false  # Optional, default is true
    skip_first: true  # Optional, false is the default
    notifiers:
      - all_mobile

  pool_flitering_alert:
    name: "Alerte Piscine filtration"
    message: >
      "Alerte pas de filtration depuis 24h"
    done_message: >
      "Filtration de nouveau actif"
    entity_id: sensor.duree_filtration_piscine_24h
    state: 0.0
    repeat: 180
    can_acknowledge: true  # Optional, default is true
    skip_first: false  # Optional, false is the default
    notifiers:
      - notify

  pool_ph_alert:
    name: "Alerte PH Piscine"
    message: >
      "PH piscine anormal ({{ states('sensor.plouf_ph') }})"
    done_message: >
      "PH piscine de nouveau normal ({{ states('sensor.plouf_ph') }})"
    entity_id: binary_sensor.ico_ph
    state: "on"   # Optional, 'on' is the default value
    repeat: 1440
    can_acknowledge: true  # Optional, default is true
    skip_first: true  # Optional, false is the default
    notifiers:
      - notify

  pool_clore_alert:
    name: "Alerte clore Piscine"
    message: >
      {% if (states('sensor.plouf_oxydo_reduction_potential') | float) < state_attr('sensor.plouf_oxydo_reduction_potential','treshold_low') %}
      "Clore piscine trop bas: {{ states('sensor.plouf_oxydo_reduction_potential') | round(2)}}"
      {% elif (states('sensor.plouf_oxydo_reduction_potential') | float) > state_attr('sensor.plouf_oxydo_reduction_potential','treshold_high') %}
      "Clore piscine trop élevé: {{ states('sensor.plouf_oxydo_reduction_potential') | round(2)}}"
      {% else %}
      Tout va bien
      {% endif %}
    done_message: >
      "Clore piscine de nouveau normal ({{ states('sensor.plouf_oxydo_reduction_potential') | round(2) }})"
    entity_id: binary_sensor.ico_redox
    state: "on"   # Optional, 'on' is the default value
    repeat: 1440
    can_acknowledge: true  # Optional, default is true
    skip_first: true  # Optional, false is the default
    notifiers:
      - notify

  pool_low_level:
    name: "Alerte niveau d'eau piscine"    
    message: "Niveau piscine trop bas."
    done_message: "Niveau d'eau piscine de nouveau correcte."
    entity_id: binary_sensor.niveau_d_eau_piscine_bas
    state: "on"   # Optional, 'on' is the default value
    repeat: 1440
    can_acknowledge: true  # Optional, default is true
    skip_first: true  # Optional, false is the default
    notifiers:
      - notify

  pool_filter_clogged:
    name: "Alerte filtre piscine encrassé"
    message: >
      Attention, le filtre de la piscine semble encrassé.
      Puissance pompe : {{ states('sensor.filtration_piscine_power_filtration') }} W (seuil : 120 W).
    done_message: >
      Filtre piscine OK. Puissance pompe : {{ states('sensor.filtration_piscine_power_filtration') }} W.
    entity_id: binary_sensor.filtre_piscine_encrasse
    state: "on"
    repeat: 30
    can_acknowledge: true
    skip_first: false
    notifiers:
      - all_mobile

