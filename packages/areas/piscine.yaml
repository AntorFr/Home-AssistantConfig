- id: 'Swimingpool_auto_filtering_hchp'
  alias: Area - Piscine - Filtration automatique (HP-HC)
  description: >-
    Filtration basée sur T_eau + présence depuis 22h, auto-corrective si nuit ratée.
    HC: toujours ON. HP: ON si need>0 et heure >= hp_debut. Tempo rouge: OFF.
  trigger:
    - trigger: time_pattern
      minutes: "/30"
    - trigger: state
      entity_id: sensor.template_teleinfo_periode_tarifaire
    - trigger: state
      entity_id: sensor.plouf_temperature
    - trigger: state
      entity_id: binary_sensor.indoor_pool_person_occupancy
    - trigger: state
      entity_id: sensor.blu_temperature_piscine_temperature
  condition:
    - condition: state
      entity_id: input_boolean.piscine_en_hivernage
      state: 'off'
  action:
  - variables:
      need: "{{ states('sensor.piscine_filtration_need') | float(0) }}"
      hp_debut: "{{ states('sensor.piscine_hp_debut') | float(12) }}"
      now_h: "{{ now().hour + now().minute / 60 }}"
      is_hc: "{{ is_state('sensor.template_teleinfo_periode_tarifaire', 'HC') }}"
      is_rouge: "{{ is_state('sensor.linky_couleur_actuelle', 'rouge') }}"
      t_air: "{{ states('sensor.blu_temperature_piscine_temperature') | float(0) }}"
      t_eau: "{{ states('sensor.plouf_temperature') | float(0) }}"
      brassage: >-
        {{ t_air > 30 and (t_air > t_eau + 5 or t_eau > 32) }}
      dans_fenetre_hp: >-
        {{ need > 0 and now_h >= hp_debut }}
  - choose:
    - conditions:
      - alias: "Tempo rouge - arrêt total"
        condition: template
        value_template: "{{ is_rouge }}"
      sequence:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.filtration_piscine_filtration
            - switch.filtration_piscine_electrolyse
    - conditions:
      - alias: "HC, brassage urgence ou fenêtre HP active"
        condition: template
        value_template: "{{ is_hc or brassage or dans_fenetre_hp }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id:
            - switch.filtration_piscine_filtration
      - if:
        - condition: template
          value_template: >
            {% set th = state_attr('sensor.plouf_oxydo_reduction_potential','treshold_high') %}
            {% set tl = state_attr('sensor.plouf_oxydo_reduction_potential','treshold_low') %}
            {% set target = (th-tl)/2+tl %}
            {{(states('sensor.plouf_oxydo_reduction_potential') | float) < target}}
        then:
        - action: switch.turn_on
          target:
            entity_id:
              - switch.filtration_piscine_electrolyse
    default:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.filtration_piscine_filtration
            - switch.filtration_piscine_electrolyse
  mode: single
################################################################################
- id: 'Swimingpool_auto_filtering_winter'
  alias: Area - Piscine - Filtration automatique (hivernage)
  description: Filtration de la piscine (hivernage)
  trigger:
    - trigger: state
      entity_id: schedule.filtration_piscine_hivernage
  condition: 
    - condition: state
      entity_id: input_boolean.piscine_en_hivernage 
      state: 'on'
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: schedule.filtration_piscine_hivernage
        state: 'on'
      sequence:
        - action: switch.turn_on
          target:
            entity_id:
              - switch.filtration_piscine_filtration
              - switch.filtration_piscine_electrolyse
    default:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.filtration_piscine_filtration
            - switch.filtration_piscine_electrolyse
  mode: single
